<svg xmlns="http://www.w3.org/2000/svg" viewBox="-90 -90 180 180" width="256" height="256">
  <title>ENC App Icon</title>
  <desc>Icona cifratura — diamante geometrico bianco e azzurro</desc>

  <!-- strati diamante (sfumatura di profondità) -->
  <polygon points="0,-78 68,0 0,78 -68,0" fill="#ffffff" fill-opacity="0.08"/>
  <polygon points="0,-62 54,0 0,62 -54,0" fill="#ffffff" fill-opacity="0.06"/>
  <polygon points="0,-42 37,0 0,42 -37,0" fill="#ffffff" fill-opacity="0.04"/>

  <!-- bordo esterno azzurro -->
  <polygon points="0,-78 68,0 0,78 -68,0" fill="none" stroke="#7dd3fc" stroke-width="2.2"/>
  <!-- bordo interno sottile -->
  <polygon points="0,-42 37,0 0,42 -37,0" fill="none" stroke="#7dd3fc" stroke-width="0.9" opacity="0.5"/>

  <!-- segni laterali -->
  <line x1="-68" y1="0" x2="-37" y2="0" stroke="#7dd3fc" stroke-width="0.9" opacity="0.45"/>
  <line x1="37" y1="0" x2="68" y2="0" stroke="#7dd3fc" stroke-width="0.9" opacity="0.45"/>

  <!-- chiave: cerchio testa -->
  <circle cx="-12" cy="-8" r="12" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <circle cx="-12" cy="-8" r="4.5" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- chiave: manico -->
  <line x1="-2" y1="2" x2="22" y2="26" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- chiave: denti -->
  <line x1="13" y1="19" x2="20" y2="12" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="25" y2="18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
